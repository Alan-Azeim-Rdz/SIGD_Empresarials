services:
  # ==========================================
  # BASES DE DATOS
  # ==========================================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sigd_sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SQL_SA_PASSWORD}
      - MSSQL_PID=Developer
    ports:
      - "1434:1433"
    volumes:
      - sql_data:/var/opt/mssql
      - ./scripts/sqlserver:/scripts
    entrypoint: /bin/bash /scripts/entrypoint.sh
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - sigd_network

  postgres:
    image: postgres:16-alpine
    container_name: sigd_postgres
    environment:
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_PASSWORD=${PG_PASSWORD}
      - POSTGRES_DB=${PG_DATABASE}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/postgres:/docker-entrypoint-initdb.d
    networks:
      - sigd_network

  mongodb:
    image: mongo:7.0
    container_name: sigd_mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
      - MONGO_INITDB_DATABASE=sigd_busqueda
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./scripts/mongo:/docker-entrypoint-initdb.d:ro
    networks:
      - sigd_network

  # ==========================================
  # APLICACIONES (MICROSERVICIOS) - DESARROLLO
  # ==========================================

  # ------------------------------------------
  # 1. MÓDULO CENTRAL (.NET) - Hot reload
  # ------------------------------------------
  modulo_central:
    build:
      context: "./src/ModuloCentral/Gestion de Documentos"
      dockerfile: "Gestion de Documentos/Dockerfile"
      target: development
    container_name: app_central_dotnet
    ports:
      - "5000:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      modulo_reportes:
        condition: service_started
    volumes:
      - "./src/ModuloCentral/Gestion de Documentos/Gestion de Documentos:/src/Gestion de Documentos"
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=${SQL_DATABASE};User Id=${APP_DB_USER};Password=${APP_DB_PASSWORD};TrustServerCertificate=True;
      - ReportesModule__BaseUrl=http://modulo_reportes
      - BusquedaModule__BaseUrl=http://modulo_busqueda:3000
      - ReportesModule__SyncApiKey=${SYNC_API_KEY:-sigd_sync_secret_2026}
      - ReportesModule__TimeoutSeconds=10
      - MONGO_URI=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongodb:27017/sigd_busqueda?authSource=admin
      - MONGO_DB_NAME=sigd_busqueda
    networks:
      - sigd_network

  # ------------------------------------------
  # 2. MÓDULO DE REPORTES (PHP) - Hot reload
  # ------------------------------------------
  modulo_reportes:
    build:
      context: ./src/ModuloReportes
    container_name: app_reportes_php
    ports:
      - "8000:80"
    depends_on:
      - postgres
    volumes:
      - ./src/ModuloReportes:/var/www/html
      - /var/www/html/vendor
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${PG_USER}
      - DB_PASS=${PG_PASSWORD}
      - DB_NAME=${PG_DATABASE}
      - SYNC_API_KEY=${SYNC_API_KEY:-sigd_sync_secret_2026}
    networks:
      - sigd_network

  # ------------------------------------------
  # 3. MÓDULO DE BÚSQUEDA (Node.js) - Hot reload
  # ------------------------------------------
  modulo_busqueda:
    build:
      context: ./src/ModuloBusqueda
      dockerfile: Dockerfile
      target: development
    container_name: app_busqueda_node
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    volumes:
      - ./src/ModuloBusqueda:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run dev
    environment:
      - MONGO_URI=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongodb:27017/sigd_busqueda?authSource=admin
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/docs"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - sigd_network

# ==========================================
# VOLÚMENES Y REDES
# ==========================================
volumes:
  sql_data:
  pg_data:
  mongo_data:

networks:
  sigd_network:
    driver: bridge
